<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
        .circle1
        {   position: fixed;
            left: 100px;
            top: 100px;
            justify-content: center;
            box-shadow: 8px 8px 15px 5px grey;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            background-color: whitesmoke;
            animation-name: moveshadow;
            animation-duration: 1s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;

        }
        .circle2
        {   position: fixed;
            left: 300px;
            top: 100px;
            justify-content: center;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            background-color: whitesmoke;
            border: 10px dotted black;
            animation-name: moveshadow;
            animation-duration: 5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;

        }
        .circle3
        {   position: fixed;
            left: 500px;
            top: 100px;
            justify-content: center;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            background-color: whitesmoke;
            border-width: 10px;
            border-style: outset;
            animation-name: moveshadow;
            animation-duration: 5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        .circle4
        {   position: fixed;
            left: 700px;
            top: 60px;
            animation-name: moveshadow;
            animation-duration: 5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        img
        {
            height: 200px;
            width: 200px;
        }
 .box2
        {
           position:fixed;
           top: 290px;
           left: 290px; 
           height: 110px;
           width: 300px;
           border: 5px solid red; 
           border-radius: 20px;
        }
        .box1
        {
           position:fixed;
           top: 300px;
           left: 300px; 
           height: 100px;
           width: 100px;
           border-radius: 20px;
            animation-name: movebox;
            animation-duration: 5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
     
            @keyframes movebox
            {
            0%
            {
            background-color: red;
            width: 0px;
            }
            25%
            {
            background-color:green;
            width: 75px;
            }
            50%
            {
            background-color: blue;
            width: 150px;
            }
            75%
            {
            background-color: yellow;
            width: 225px;
            }
            100%
            {
            background-color: purple;
            width:290px;
            } 
        
            } 
        @keyframes moveshadow 
        {
        0%
        {
            transform: rotate(0deg);
        }
        100%
        {
            transform: rotate(360deg);
        }

        }
    </style>
</head>
<body>
    <h1>CSS LOADER</h1>
    <div class="circle1"> </div>
    <div class="circle2"> </div>
    <div class="circle3"> </div>
    <div class="circle4"> <img src="set.png"></div>
     <div class="box1"></div>
     <div class="box2"></div>
  
</body>
</html>
